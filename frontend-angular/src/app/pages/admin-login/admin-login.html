<div class="admin-login-page">
  <button class="back-btn" (click)="goBack()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Volver
  </button>

  <div class="login-box">
    <div class="box-header">
      <div class="admin-badge">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        Acceso Restringido
      </div>
      <h1>Panel de Administración</h1>
      <p>Ingresa con tus credenciales de administrador</p>
    </div>

    @if (error) {
      <div class="error-alert">{{ error }}</div>
    }

    <form (submit)="login(); $event.preventDefault()" class="login-form">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="admin@nexstore.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="submit-btn" [disabled]="loading">
        @if (loading) { Verificando... } @else { Ingresar al panel }
      </button>
    </form>
  </div>
</div>
