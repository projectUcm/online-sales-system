<div class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="32" height="32" viewBox="0 0 22 22" fill="none">
        <polygon points="11,1 21,6 21,16 11,21 1,16 1,6" fill="#7c6af7" opacity=".9"/>
        <polygon points="11,5 17,8.5 17,15.5 11,19 5,15.5 5,8.5" fill="none" stroke="#fff" stroke-width="1.2"/>
      </svg>
      <span>NEXSTORE</span>
    </div>

    <h1 class="auth-title">Crear Cuenta</h1>
    <p class="auth-sub">Únete y empieza a comprar hoy</p>

    @if (error) {
      <div class="alert alert-err">{{ error }}</div>
    }

    <div class="field">
      <label>Nombre</label>
      <input [(ngModel)]="name" type="text" placeholder="Tu nombre completo" autocomplete="name" />
    </div>

    <div class="field">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="tu@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input [(ngModel)]="password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
    </div>

    <div class="field">
      <label>Teléfono <span class="optional">(opcional, para notificaciones SMS)</span></label>
      <input [(ngModel)]="phone" type="tel" placeholder="+56912345678" />
    </div>

    <button class="btn btn-primary auth-btn" (click)="submit()" [disabled]="loading">
      @if (loading) {
        <span class="spinner"></span> Registrando...
      } @else {
        Crear Cuenta
      }
    </button>

    <p class="auth-footer">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
