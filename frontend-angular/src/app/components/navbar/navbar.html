<nav class="navbar">
  <a routerLink="/products" class="brand">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <polygon points="11,1 21,6 21,16 11,21 1,16 1,6" fill="#7c6af7" opacity=".9"/>
      <polygon points="11,5 17,8.5 17,15.5 11,19 5,15.5 5,8.5" fill="none" stroke="#fff" stroke-width="1.2"/>
    </svg>
    <span>NEXSTORE</span>
  </a>

  @if (auth.isLoggedIn()) {
    <div class="nav-links">
      <a routerLink="/products" routerLinkActive="active">Productos</a>
      <a routerLink="/files" routerLinkActive="active">Mis Archivos</a>
      <a routerLink="/checkout" routerLinkActive="active">Checkout</a>
      <button class="nav-logout" (click)="auth.logout()">Salir →</button>

      <div class="nav-cart-group">
        <button class="nav-cart-btn" (click)="drawer.toggle()" title="Abrir carrito">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="1.8"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          @if (cart.count() > 0) {
            <span class="cart-badge">{{ cart.count() }}</span>
          }
        </button>
      </div>
    </div>
  } @else {
    <div class="nav-links">
      <a routerLink="/login" routerLinkActive="active">Ingresar</a>
      <a routerLink="/register" class="nav-cta" routerLinkActive="active">Crear cuenta</a>
    </div>
  }
</nav>
