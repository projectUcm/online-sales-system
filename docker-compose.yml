services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sales
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sales"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend-fastapi
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/sales
      SECRET_KEY: change-me-in-production
      PAYMENT_SERVICE_URL: http://app-pagos:8001/pay
    depends_on:
      db:
        condition: service_healthy
      app-pagos:
        condition: service_started

  app-pagos:
    build: ./payment-service
    ports:
      - "8001:8001"
    environment:
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY}

  frontend:
    build: ./frontend-angular
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
