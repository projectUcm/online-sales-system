name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: online-sales-cluster
  EC2_NOTIFICATION_HOST: ${{ secrets.EC2_NOTIFICATION_HOST }}

jobs:
  build:
    name: Build y Push imágenes
    runs-on: ubuntu-latest

    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      payment-image: ${{ steps.build-payment.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
      notification-image: ${{ steps.build-notification.outputs.image }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # BACKEND
      - name: Build y push Backend
        id: build-backend
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/backend-fastapi:latest
          docker build -t $IMAGE ./backend-fastapi
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # PAYMENT
      - name: Build y push Payment
        id: build-payment
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/payment-service:latest
          docker build -t $IMAGE ./payment-service
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # FRONTEND
      - name: Build y push Frontend
        id: build-frontend
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/frontend-angular:latest
          docker build --no-cache -t $IMAGE ./frontend-angular
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # NOTIFICATION SERVICE
      - name: Build y push Notification Service
        id: build-notification
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/notification-service:latest
          docker build -t $IMAGE ./notification-service
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inyectar variables backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          sed -i "s/ACCOUNT_ID/$ACCOUNT_ID/g" .aws/task-def-backend.json
          sed -i "s/NOTIFICATION_EC2_HOST/${{ secrets.EC2_NOTIFICATION_HOST }}/g" .aws/task-def-backend.json
          sed -i "s|\"value\": \"\"|\"value\": \"\"|g" .aws/task-def-backend.json
          python3 -c "
import json, sys
with open('.aws/task-def-backend.json') as f: td = json.load(f)
env = td['containerDefinitions'][0]['environment']
updates = {
  'AWS_ACCESS_KEY_ID': '${{ secrets.AWS_ACCESS_KEY_ID }}',
  'AWS_SECRET_ACCESS_KEY': '${{ secrets.AWS_SECRET_ACCESS_KEY }}',
  'SES_SENDER_EMAIL': '${{ secrets.SES_SENDER_EMAIL }}',
  'S3_BUCKET_NAME': '${{ secrets.S3_BUCKET_NAME }}',
  'TWILIO_ACCOUNT_SID': '${{ secrets.TWILIO_ACCOUNT_SID }}',
  'TWILIO_AUTH_TOKEN': '${{ secrets.TWILIO_AUTH_TOKEN }}',
  'TWILIO_FROM_NUMBER': '${{ secrets.TWILIO_FROM_NUMBER }}',
  'SNS_TOPIC_ARN': '${{ secrets.SNS_TOPIC_ARN }}',
}
for e in env:
  if e['name'] in updates: e['value'] = updates[e['name']]
with open('.aws/task-def-backend.json', 'w') as f: json.dump(td, f, indent=2)
"

      - name: Render task definition backend
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-backend.json
          container-name: backend
          image: ${{ needs.build.outputs.backend-image }}

      - name: Deploy ECS Backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: backend-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-payment:
    name: Deploy Payment
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inyectar variables
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          sed -i "s/ACCOUNT_ID/$ACCOUNT_ID/g" .aws/task-def-payment.json
          sed -i "s|MP_TOKEN_PLACEHOLDER|${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}|g" .aws/task-def-payment.json
          sed -i "s|MP_PUBLIC_KEY_PLACEHOLDER|${{ secrets.MERCADOPAGO_PUBLIC_KEY }}|g" .aws/task-def-payment.json

      - name: Render task definition payment
        id: render-payment
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-payment.json
          container-name: payment
          image: ${{ needs.build.outputs.payment-image }}

      - name: Deploy ECS Payment
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-payment.outputs.task-definition }}
          service: payment-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition frontend
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-frontend.json
          container-name: frontend
          image: ${{ needs.build.outputs.frontend-image }}

      - name: Deploy ECS Frontend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: frontend-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-notification:
    name: Deploy Notification Service (EC2 via SSH)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener Account ID
        id: get-account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH a EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCOUNT_ID: ${{ steps.get-account.outputs.account_id }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.EC2_NOTIFICATION_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_ACCOUNT_ID
          script: |
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin \
              ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com
            docker pull ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/notification-service:latest
            docker stop notification-service 2>/dev/null || true
            docker rm notification-service 2>/dev/null || true
            docker run -d \
              --name notification-service \
              --restart always \
              -p 8002:8002 \
              -e AWS_REGION=us-east-1 \
              -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
              -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
              -e SES_SENDER_EMAIL=${{ secrets.SES_SENDER_EMAIL }} \
              -e TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }} \
              -e TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }} \
              -e TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }} \
              -e SNS_TOPIC_ARN=${{ secrets.SNS_TOPIC_ARN }} \
              ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/notification-service:latest
