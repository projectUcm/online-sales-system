name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: online-sales-cluster

jobs:
  test-frontend:
    name: Tests Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend-angular

      - name: Ejecutar tests
        run: npm test -- --watch=false
        working-directory: frontend-angular

  build:
    name: Build y Push imágenes
    runs-on: ubuntu-latest
    needs: test-frontend
    outputs:
      backend-image:  ${{ steps.build-backend.outputs.image }}
      payment-image:  ${{ steps.build-payment.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push Backend
        id: build-backend
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/backend-api:${{ github.sha }}
          docker build -t $IMAGE ./backend-fastapi
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build y push Payment
        id: build-payment
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/payment-api:${{ github.sha }}
          docker build -t $IMAGE ./payment-service
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build y push Frontend
        id: build-frontend
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/frontend-app:${{ github.sha }}
          docker build -t $IMAGE ./frontend-angular
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inyectar variables
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          sed -i "s/ACCOUNT_ID/$ACCOUNT_ID/g"                              .aws/task-def-backend.json
          sed -i "s|DATABASE_URL_PLACEHOLDER|${{ secrets.DATABASE_URL }}|g" .aws/task-def-backend.json
          sed -i "s|SECRET_KEY_PLACEHOLDER|${{ secrets.SECRET_KEY }}|g"     .aws/task-def-backend.json

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-backend.json
          container-name: backend
          image: ${{ needs.build.outputs.backend-image }}

      - name: Deploy en ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: backend-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

  deploy-payment:
    name: Deploy Payment
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inyectar variables
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          sed -i "s/ACCOUNT_ID/$ACCOUNT_ID/g" .aws/task-def-payment.json
          sed -i "s|MP_TOKEN_PLACEHOLDER|${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}|g" .aws/task-def-payment.json
          sed -i "s|MP_PUBLIC_KEY_PLACEHOLDER|${{ secrets.MERCADOPAGO_PUBLIC_KEY }}|g" .aws/task-def-payment.json

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-payment.json
          container-name: payment
          image: ${{ needs.build.outputs.payment-image }}

      - name: Deploy en ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: payment-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inyectar variables
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          sed -i "s/ACCOUNT_ID/$ACCOUNT_ID/g" .aws/task-def-frontend.json

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-frontend.json
          container-name: frontend
          image: ${{ needs.build.outputs.frontend-image }}

      - name: Deploy en ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: frontend-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false
